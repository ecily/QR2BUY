[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 115200
monitor_port  = COM5
upload_port   = COM5

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  bblanchon/ArduinoJson@^7.0.4
  https://github.com/ricmoo/QRCode.git

build_flags =
  -D USER_SETUP_LOADED
  -D ILI9341_DRIVER
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MISO=19
  -D TFT_MOSI=23
  -D TFT_SCLK=18
  -D TFT_CS=5
  -D TFT_DC=15
  -D TFT_RST=4
  -D SPI_FREQUENCY=8000000
  -D SPI_READ_FREQUENCY=16000000
  -D LOAD_GLCD
  -D LOAD_FONT2
  -D LOAD_FONT4
