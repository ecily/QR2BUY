[env]
platform = espressif32@7.0.1
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
monitor_port = COM3
upload_port = COM3

[diag_tft_base]
lib_deps =
  bodmer/TFT_eSPI@2.5.43
build_src_filter =
  +<display_diag.cpp>
  -<main.cpp>
  -<parallel8080_diag.cpp>

[diag_direct_base]
build_src_filter =
  +<parallel8080_diag.cpp>
  -<main.cpp>
  -<display_diag.cpp>

[env:esp32dev]
lib_deps =
  bodmer/TFT_eSPI@2.5.43
  bblanchon/ArduinoJson@^7.0.4
  https://github.com/ricmoo/QRCode.git
build_src_filter =
  +<main.cpp>
  -<display_diag.cpp>
  -<parallel8080_diag.cpp>
build_flags =
  -D USER_SETUP_LOADED
  -include include/tft_setup_spi_cs5_rst4.h

[env:esp32dev_spi_cs5_rst4_tft_diag]
lib_deps = ${diag_tft_base.lib_deps}
build_src_filter = ${diag_tft_base.build_src_filter}
build_flags =
  -D USER_SETUP_LOADED
  -D QR2BUY_TFT_DIAG
  -D QR2BUY_ENV_SPI_CS5_RST4
  -include include/tft_setup_spi_cs5_rst4.h

[env:esp32dev_spi_nocs_rst4_tft_diag]
lib_deps = ${diag_tft_base.lib_deps}
build_src_filter = ${diag_tft_base.build_src_filter}
build_flags =
  -D USER_SETUP_LOADED
  -D QR2BUY_TFT_DIAG
  -D QR2BUY_ENV_SPI_NOCS_RST4
  -include include/tft_setup_spi_nocs_rst4.h

[env:esp32dev_spi_cs5_norst_tft_diag]
lib_deps = ${diag_tft_base.lib_deps}
build_src_filter = ${diag_tft_base.build_src_filter}
build_flags =
  -D USER_SETUP_LOADED
  -D QR2BUY_TFT_DIAG
  -D QR2BUY_ENV_SPI_CS5_NORST
  -include include/tft_setup_spi_cs5_norst.h

[env:esp32dev_spi_cs5_rst4_qr_diag]
lib_deps =
  ${diag_tft_base.lib_deps}
  https://github.com/ricmoo/QRCode.git
build_src_filter = ${diag_tft_base.build_src_filter}
build_flags =
  -D USER_SETUP_LOADED
  -D QR2BUY_QR_DIAG
  -D QR2BUY_ENV_SPI_CS5_RST4
  -include include/tft_setup_spi_cs5_rst4.h

[env:esp32dev_spi_cs5_rst4_app]
lib_deps =
  bodmer/TFT_eSPI@2.5.43
  https://github.com/ricmoo/QRCode.git
build_src_filter =
  +<static_app.cpp>
  -<main.cpp>
  -<display_diag.cpp>
  -<parallel8080_diag.cpp>
build_flags =
  -D USER_SETUP_LOADED
  -D QR2BUY_ENV_SPI_CS5_RST4
  -include include/tft_setup_spi_cs5_rst4.h

[env:esp32dev_parallel_legacy_tft_diag]
lib_deps = ${diag_tft_base.lib_deps}
build_src_filter = ${diag_tft_base.build_src_filter}
build_flags =
  -D USER_SETUP_LOADED
  -D QR2BUY_TFT_DIAG
  -D QR2BUY_ENV_PARALLEL_LEGACY
  -include include/tft_setup_parallel_legacy.h

[env:esp32dev_parallel_legacy_qr_diag]
lib_deps =
  ${diag_tft_base.lib_deps}
  https://github.com/ricmoo/QRCode.git
build_src_filter = ${diag_tft_base.build_src_filter}
build_flags =
  -D USER_SETUP_LOADED
  -D QR2BUY_QR_DIAG
  -D QR2BUY_ENV_PARALLEL_LEGACY
  -include include/tft_setup_parallel_legacy.h

[env:esp32dev_parallel_setup14_tft_diag]
lib_deps = ${diag_tft_base.lib_deps}
build_src_filter = ${diag_tft_base.build_src_filter}
build_flags =
  -D USER_SETUP_LOADED
  -D QR2BUY_TFT_DIAG
  -D QR2BUY_ENV_PARALLEL_SETUP14
  -include include/tft_setup_parallel_setup14.h

[env:esp32dev_parallel_legacy_data_safe_tft_diag]
lib_deps = ${diag_tft_base.lib_deps}
build_src_filter = ${diag_tft_base.build_src_filter}
build_flags =
  -D USER_SETUP_LOADED
  -D QR2BUY_TFT_DIAG
  -D QR2BUY_ENV_PARALLEL_LEGACY_DATA_SAFE
  -include include/tft_setup_parallel_legacy_data_safe.h

[env:esp32dev_parallel_legacy_direct8080_tft_diag]
build_src_filter = ${diag_direct_base.build_src_filter}
build_flags =
  -D QR2BUY_DIRECT8080_TFT_DIAG
  -D QR2BUY_ENV_PARALLEL_LEGACY_DIRECT8080

[env:esp32dev_parallel_legacy_direct8080_qr_diag]
lib_deps =
  https://github.com/ricmoo/QRCode.git
build_src_filter = ${diag_direct_base.build_src_filter}
build_flags =
  -D QR2BUY_DIRECT8080_QR_DIAG
  -D QR2BUY_ENV_PARALLEL_LEGACY_DIRECT8080

; Backwards-compatible aliases from earlier diagnostics.
[env:esp32dev_tft_diag]
extends = env:esp32dev_spi_cs5_rst4_tft_diag

[env:esp32dev_parallel_tft_diag]
extends = env:esp32dev_parallel_legacy_tft_diag

[env:esp32dev_parallel_qr_diag]
extends = env:esp32dev_parallel_legacy_qr_diag
